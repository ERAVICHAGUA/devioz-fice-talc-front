name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: project-ec71bfb1-d784-43f4-838
      REGION: us-central1
      REPOSITORY: engineai
      SERVICE: devioz-frontend
      IMAGE_NAME: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/777439108015/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-deployer@project-ec71bfb1-d784-43f4-838.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ✅ Verifica que los secrets existan
      - name: Check required secrets exist
        run: |
          test -n "${{ secrets.VITE_TALC_BASE_URL }}" && echo "TALC secret OK" || (echo "TALC secret EMPTY" && exit 1)
          test -n "${{ secrets.VITE_FICE_BASE_URL }}" && echo "FICE secret OK" || (echo "FICE secret EMPTY" && exit 1)
          test -n "${{ secrets.VITE_TIIE_BASE_URL }}" && echo "TIIE secret OK" || (echo "TIIE secret EMPTY" && exit 1)
          test -n "${{ secrets.VITE_CRFE_BASE_URL }}" && echo "CRFE secret OK" || (echo "CRFE secret EMPTY" && exit 1)
          test -n "${{ secrets.VITE_DSE_BASE_URL }}" && echo "DSE secret OK" || (echo "DSE secret EMPTY" && exit 1)

      # ✅ Build Docker image
      - name: Build Docker image
        run: |
          docker build --no-cache \
            --build-arg VITE_TALC_BASE_URL=${{ secrets.VITE_TALC_BASE_URL }} \
            --build-arg VITE_FICE_BASE_URL=${{ secrets.VITE_FICE_BASE_URL }} \
            --build-arg VITE_TIIE_BASE_URL=${{ secrets.VITE_TIIE_BASE_URL }} \
            --build-arg VITE_CRFE_BASE_URL=${{ secrets.VITE_CRFE_BASE_URL }} \
            --build-arg VITE_DSE_BASE_URL=${{ secrets.VITE_DSE_BASE_URL }} \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$GITHUB_SHA \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest \
            .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$GITHUB_SHA
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated